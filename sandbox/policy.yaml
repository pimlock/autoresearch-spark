# Runtime policy for autoresearch-spark sandbox.
#
# Python dependencies (PyTorch cu128, etc.) are installed at container build
# time via `uv sync`, so PyPI / PyTorch wheel access is NOT needed at runtime.
#
# For development (installing new packages at runtime), use the dev policy
# which adds pypi + pytorch endpoints. See policy-dev.yaml.

version: 1

# --- Sandbox setup configuration (queried once at startup) ---

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

# --- Network policies (queried per-CONNECT request) ---
#
# Runtime needs: agent tools (Claude, Codex, OpenCode), GitHub (git ops),
# and HuggingFace (prepare.py downloads training data shards at runtime).

network_policies:
  claude_code:
    name: claude-code
    endpoints:
      - { host: api.anthropic.com, port: 443, protocol: rest, enforcement: enforce, access: full, tls: terminate }
      - { host: statsig.anthropic.com, port: 443 }
      - { host: sentry.io, port: 443 }
      - { host: raw.githubusercontent.com, port: 443 }
      - { host: platform.claude.com, port: 443 }
      - { host: storage.googleapis.com, port: 443 }
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/bin/node }

  github_ssh_over_https:
    name: github-ssh-over-https
    endpoints:
      - host: github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: "/**/info/refs*"
          - allow:
              method: POST
              path: "/**/git-upload-pack"
    binaries:
      - { path: /usr/bin/git }

  github_rest_api:
    name: github-rest-api
    endpoints:
      - host: api.github.com
        port: 443
        protocol: rest
        tls: terminate
        enforcement: enforce
        access: read-only
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/bin/gh }

  nvidia_inference:
    name: nvidia-inference
    endpoints:
      - { host: integrate.api.nvidia.com, port: 443 }
    binaries:
      - { path: /usr/bin/curl }
      - { path: /bin/bash }
      - { path: /usr/local/bin/opencode }

  # HuggingFace — prepare.py downloads training data shards + tokenizer data
  # at runtime. The xethub subdomains handle large file transfers via HF's
  # content-addressable storage.
  huggingface:
    name: huggingface
    endpoints:
      - { host: huggingface.co, port: 443 }
      - { host: cas-bridge.xethub.hf.co, port: 443 }
      - { host: cas-server.xethub.hf.co, port: 443 }
      - { host: transfer.xethub.hf.co, port: 443 }
    binaries:
      - { path: "/sandbox/.uv/python/**" }
      - { path: /sandbox/.venv/bin/python }
      - { path: /sandbox/.venv/bin/python3 }

  opencode:
    name: opencode
    endpoints:
      - { host: registry.npmjs.org, port: 443 }
      - { host: opencode.ai, port: 443 }
      - { host: integrate.api.nvidia.com, port: 443 }
    binaries:
      - { path: /usr/lib/node_modules/opencode-ai/bin/.opencode }
      - { path: /usr/bin/node }
      - { path: /usr/local/bin/opencode }
